<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十二方位中心定位工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 防止圖片被選取或預設拖曳行為影響自定義的平移功能 */
        #targetImage {
            user-select: none;
            -webkit-user-drag: none;
        }
        /* 直向拉桿的跨瀏覽器樣式支援 */
        input[type=range][orient=vertical] {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            width: 12px;
            height: 200px;
            padding: 0 5px;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden font-sans">

    <div id="viewport" class="relative flex-1 overflow-hidden bg-slate-800 cursor-grab active:cursor-grabbing touch-none">
        <div id="placeholderText" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 z-0 pointer-events-none">
            <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
            <p class="text-xl font-medium text-slate-300">請直接在此頁面貼上圖片</p>
            <p class="text-lg mt-1 text-slate-400">(使用 Ctrl+V 或 Cmd+V)</p>
            <p class="text-sm mt-4">貼上後可拖曳圖片對齊中心十字</p>
        </div>

        <img id="targetImage" class="absolute origin-top-left" style="display:none; pointer-events: none;" alt="User image">
        
        <canvas id="overlayCanvas" class="absolute inset-0 pointer-events-none z-10"></canvas>

        <div id="zoomControls" class="absolute right-6 top-1/2 -translate-y-1/2 flex flex-col items-center gap-3 bg-slate-900/70 p-4 rounded-full shadow-2xl backdrop-blur-sm z-20 border border-slate-700/50">
            <span class="text-white text-lg font-medium select-none" title="放大">➕</span>
            <input type="range" id="zoomSlider" orient="vertical" min="0" max="100" step="1" value="50" class="cursor-pointer outline-none">
            <span class="text-white text-lg font-medium select-none" title="縮小">➖</span>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const img = document.getElementById('targetImage');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');
        const zoomSlider = document.getElementById('zoomSlider');
        const placeholderText = document.getElementById('placeholderText');

        // 圖片狀態參數
        let imgX = 0;
        let imgY = 0;
        let scale = 1;
        
        // 拖曳狀態參數
        let isDragging = false;
        let startX = 0;
        let startY = 0;

        // 十二地支 (由正上方順時針)
        const branches = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        const directions = ['(北)', '', '', '(東)', '', '', '(南)', '', '', '(西)', '', ''];

        // 初始化畫布與繪製覆蓋層
        function resizeAndDraw() {
            canvas.width = viewport.clientWidth;
            canvas.height = viewport.clientHeight;
            drawOverlay();
        }

        // 繪製十二方位儀
        function drawOverlay() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const maxRadius = Math.sqrt(cx*cx + cy*cy); // 確保線條延伸至角落
            const innerRadius = Math.min(cx, cy) * 0.7; // 文字所在的圓圈半徑

            // --- 1. 繪製 12 區塊分隔線 ---
            ctx.strokeStyle = '#FF3333'; // 鮮紅色
            ctx.lineWidth = 2; // 稍微加粗
            ctx.setLineDash([5, 5]); // 虛線效果

            for (let i = 0; i < 12; i++) {
                // 每格30度。子(0)的中心在正上方(-90度)。
                // 分隔線位在區塊中心偏移15度的地方。
                const centerAngle = -Math.PI / 2 + (i * Math.PI / 6);
                const lineAngle = centerAngle + (Math.PI / 12);

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + maxRadius * Math.cos(lineAngle), cy + maxRadius * Math.sin(lineAngle));
                ctx.stroke();
            }

            // 恢復實線
            ctx.setLineDash([]);

            // --- 2. 繪製方位文字 ---
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = 0; i < 12; i++) {
                const centerAngle = -Math.PI / 2 + (i * Math.PI / 6);
                const tx = cx + innerRadius * Math.cos(centerAngle);
                const ty = cy + innerRadius * Math.sin(centerAngle);

                // 文字背景圈 (增加辨識度)
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.beginPath();
                ctx.arc(tx, ty, 20, 0, 2 * Math.PI);
                ctx.fill();

                // 邊框
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)'; // 金色邊框
                ctx.lineWidth = 2;
                ctx.stroke();

                // 文字
                ctx.fillStyle = '#FFD700'; // 金色文字
                ctx.font = 'bold 18px sans-serif';
                ctx.fillText(branches[i], tx, ty - (directions[i] ? 6 : 0));
                
                // 次要方位標示 (東南西北)
                if (directions[i]) {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = '10px sans-serif';
                    ctx.fillText(directions[i], tx, ty + 10);
                }
            }

            // --- 3. 繪製外圈圓與內圈輔助圓 ---
            ctx.beginPath();
            ctx.arc(cx, cy, innerRadius * 1.15, 0, 2*Math.PI);
            ctx.strokeStyle = 'rgba(255, 51, 51, 0.8)'; // 半透明鮮紅色
            ctx.lineWidth = 2;
            ctx.stroke();

            // --- 4. 繪製中心十字與圓點 ---
            ctx.strokeStyle = '#FF3333'; // 鮮紅色
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - 30, cy); ctx.lineTo(cx + 30, cy);
            ctx.moveTo(cx, cy - 30); ctx.lineTo(cx, cy + 30);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, 2*Math.PI);
            ctx.fillStyle = '#FF3333';
            ctx.fill();
        }

        // 更新圖片的變形 (位移與縮放)
        function updateImgTransform() {
            img.style.transform = `translate(${imgX}px, ${imgY}px) scale(${scale})`;
        }

        // 讀取圖片檔案並顯示
        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                img.onload = () => {
                    placeholderText.style.display = 'none';
                    img.style.display = 'block';
                    
                    // 重置比例為原圖大小 1.0 (對應拉桿中點 50)
                    scale = 1;
                    zoomSlider.value = 50;
                    
                    // 初始置中圖片
                    const cx = viewport.clientWidth / 2;
                    const cy = viewport.clientHeight / 2;
                    imgX = cx - (img.naturalWidth / 2);
                    imgY = cy - (img.naturalHeight / 2);
                    
                    updateImgTransform();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 監聽視窗調整大小
        window.addEventListener('resize', resizeAndDraw);
        resizeAndDraw(); // 初始繪製

        // 處理剪貼簿貼上事件 (Ctrl+V)
        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    loadImage(blob);
                }
            }
        });

        // --- 拖曳與平移控制 (支援滑鼠與觸控) ---
        function startDrag(clientX, clientY) {
            isDragging = true;
            startX = clientX - imgX;
            startY = clientY - imgY;
        }

        function moveDrag(clientX, clientY) {
            if (!isDragging) return;
            imgX = clientX - startX;
            imgY = clientY - startY;
            updateImgTransform();
        }

        function endDrag() {
            isDragging = false;
        }

        // 滑鼠事件
        viewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('#zoomControls')) return;
            startDrag(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', endDrag);

        // 觸控事件 (支援手機)
        viewport.addEventListener('touchstart', (e) => {
            if(e.target.closest('#zoomControls')) return;
            if (e.touches.length === 1) {
                startDrag(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault(); // 防止滾動畫面
                moveDrag(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchend', endDrag);

        // --- 縮放控制 ---
        // 滑鼠滾輪縮放
        viewport.addEventListener('wheel', (e) => {
            if (img.style.display === 'none') return;
            e.preventDefault();
            
            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            const oldScale = scale;
            scale = Math.min(Math.max(0.1, scale + delta), 5); // 限制縮放範圍 0.1x ~ 5x
            
            // 將目前的 scale 值映射回 0 ~ 100 範圍的拉桿數值
            if (scale <= 1) {
                zoomSlider.value = Math.round(((scale - 0.1) / 0.9) * 50);
            } else {
                zoomSlider.value = Math.round(50 + ((scale - 1) / 4) * 50);
            }
            
            // 以畫面中心為基準點進行縮放計算
            const cx = viewport.clientWidth / 2;
            const cy = viewport.clientHeight / 2;
            imgX = cx - (cx - imgX) * (scale / oldScale);
            imgY = cy - (cy - imgY) * (scale / oldScale);
            
            updateImgTransform();
        }, { passive: false });

        // 拉桿縮放
        zoomSlider.addEventListener('input', (e) => {
            if (img.style.display === 'none') return;
            const val = parseFloat(e.target.value);
            
            // 將 0 ~ 100 的拉桿數值映射為非線性縮放比例 (0.1 ~ 1.0 ~ 5.0)
            let newScale;
            if (val <= 50) {
                newScale = 0.1 + (val / 50) * 0.9;
            } else {
                newScale = 1.0 + ((val - 50) / 50) * 4.0;
            }
            
            const oldScale = scale;
            const cx = viewport.clientWidth / 2;
            const cy = viewport.clientHeight / 2;
            
            imgX = cx - (cx - imgX) * (newScale / oldScale);
            imgY = cy - (cy - imgY) * (newScale / oldScale);
            scale = newScale;
            updateImgTransform();
        });
        
        // 防止拉桿與其外框觸發父層拖曳
        const zoomControls = document.getElementById('zoomControls');
        zoomControls.addEventListener('mousedown', (e) => e.stopPropagation());
        zoomControls.addEventListener('touchstart', (e) => e.stopPropagation());

    </script>
</body>
</html>
